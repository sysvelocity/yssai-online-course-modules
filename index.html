<!-- YSS_STANDALONE_APP_V2 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YSS AI Coach</title>
  <style>
    :root {
      --bg: #e9eef3;
      --panel: rgba(255, 255, 255, 0.85);
      --panel-border: rgba(207, 217, 229, 0.9);
      --text: #142033;
      --muted: #627287;
      --accent: #0b63ce;
      --accent-hover: #0954ae;
      --user-bg: #d9ebff;
      --assistant-bg: #f4f6f8;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.10);
      --radius: 20px;
      --font: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      padding: 28px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.68);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .logo {
      display: block;
      width: min(420px, 100%);
      height: auto;
    }

    .messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 26px 24px 10px;
      scroll-behavior: smooth;
    }

    .empty {
      max-width: 760px;
      margin: 24px auto;
      padding: 22px 24px;
      border: 1px dashed var(--panel-border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.64);
      color: var(--muted);
      line-height: 1.6;
    }

    .message {
      max-width: 900px;
      margin: 0 auto 18px;
    }

    .label {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .bubble {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      white-space: pre-wrap;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
    }

    .bubble p {
      margin: 0 0 12px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble strong {
      font-weight: 700;
    }

    .bubble h1,
    .bubble h2,
    .bubble h3,
    .bubble h4 {
      margin: 0 0 10px;
      line-height: 1.3;
    }

    .bubble h1 { font-size: 24px; }
    .bubble h2 { font-size: 21px; }
    .bubble h3 { font-size: 18px; }
    .bubble h4 { font-size: 16px; }

    .bubble ul {
      margin: 0 0 12px 20px;
      padding: 0;
    }

    .bubble li {
      margin: 0 0 8px;
    }

    .bubble hr {
      border: 0;
      border-top: 1px solid #d0d7e2;
      margin: 14px 0;
    }

    .composer-wrap {
      flex: 0 0 auto;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.9);
    }

    .status {
      min-height: 18px;
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .composer {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input {
      flex: 1 1 auto;
      min-height: 120px;
      max-height: 260px;
      resize: vertical;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      outline: none;
      padding: 15px 16px;
      font: inherit;
      line-height: 1.5;
      color: var(--text);
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex: 0 0 auto;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, opacity 140ms ease;
    }

    .button.send {
      background: var(--accent);
      color: white;
    }

    .button.send:hover {
      background: var(--accent-hover);
    }

    .button.reset {
      background: #e7ecf2;
      color: var(--text);
    }

    .button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .shell {
        min-height: calc(100vh - 24px);
        border-radius: 20px;
      }

      .composer {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        width: 100%;
      }

      .button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="brand">
        <img
          class="logo"
          src="/yss-ai-assist-logo.jpg"
          alt="Your Sales Story with AI Assist"
        />
        <p class="subtitle">AI Assist | Create your customer issues addressed talking points</p>
      </div>
    </header>

    <section id="messages" class="messages">
      <div class="empty">
        Paste your bridge line and talking points, or ask for help getting started.
      </div>
    </section>

    <section class="composer-wrap">
      <div id="status" class="status">Ready</div>
      <div class="composer">
        <textarea
          id="input"
          class="input"
          placeholder="Paste your bridge line and talking points, or ask for help getting started."
        ></textarea>
        <div class="actions">
          <button id="resetBtn" class="button reset" type="button">Start Again</button>
          <button id="sendBtn" class="button send" type="button">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");

    let state = {
      history: [],
      busy: false
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function inlineMarkdown(text) {
      return text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text || "");
      const lines = escaped.split("\n");
      let html = "";
      let inList = false;

      function closeList() {
        if (inList) {
          html += "</ul>";
          inList = false;
        }
      }

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          closeList();
          continue;
        }

        if (line === "---") {
          closeList();
          html += "<hr>";
          continue;
        }

        if (line.startsWith("#### ")) {
          closeList();
          html += `<h4>${inlineMarkdown(line.slice(5))}</h4>`;
          continue;
        }

        if (line.startsWith("### ")) {
          closeList();
          html += `<h3>${inlineMarkdown(line.slice(4))}</h3>`;
          continue;
        }

        if (line.startsWith("## ")) {
          closeList();
          html += `<h2>${inlineMarkdown(line.slice(3))}</h2>`;
          continue;
        }

        if (line.startsWith("# ")) {
          closeList();
          html += `<h1>${inlineMarkdown(line.slice(2))}</h1>`;
          continue;
        }

        if (line.startsWith("- ")) {
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += `<li>${inlineMarkdown(line.slice(2))}</li>`;
          continue;
        }

        closeList();
        html += `<p>${inlineMarkdown(line)}</p>`;
      }

      closeList();
      return html;
    }

    function setBusy(isBusy, statusText = "") {
      state.busy = isBusy;
      sendBtn.disabled = isBusy;
      resetBtn.disabled = isBusy;
      statusEl.textContent = statusText;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function render() {
      if (!state.history.length) {
        messagesEl.innerHTML = `
          <div class="empty">
            Paste your bridge line and talking points, or ask for help getting started.
          </div>
        `;
        return;
      }

      messagesEl.innerHTML = state.history.map((item) => {
        const role = item.role === "assistant" ? "assistant" : "user";
        const label = role === "assistant" ? "AI Coach" : "You";
        const content = role === "assistant"
          ? renderMarkdown(item.content || "")
          : escapeHtml(item.content || "").replaceAll("\n", "<br>");

        return `
          <article class="message ${role}">
            <div class="label">${label}</div>
            <div class="bubble">${content}</div>
          </article>
        `;
      }).join("");

      scrollToBottom();
    }

    async function streamChat(message, history) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "text/event-stream"
        },
        body: JSON.stringify({
          message,
          history
        })
      });

      if (!response.ok || !response.body) {
        const errorText = await response.text();
        throw new Error(errorText || `Request failed with status ${response.status}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      const assistantIndex = state.history.length;

      state.history.push({ role: "assistant", content: "" });
      render();

      while (true) {
        const { value, done } = await reader.read();

        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data: ")) {
            continue;
          }

          const payload = JSON.parse(line.slice(6));

          if (payload.type === "delta") {
            state.history[assistantIndex].content += payload.delta;
            render();
          }

          if (payload.type === "error") {
            throw new Error(payload.message || "Streaming error");
          }

          if (payload.type === "done") {
            return;
          }
        }
      }
    }

    sendBtn.addEventListener("click", async () => {
      if (state.busy) {
        return;
      }

      const message = inputEl.value.trim();

      if (!message) {
        statusEl.textContent = "Enter a bridge line and talking points, or ask for help getting started.";
        return;
      }

      const historyForRequest = [...state.history];
      state.history.push({ role: "user", content: message });
      render();
      inputEl.value = "";
      setBusy(true, "Streaming response...");

      try {
        await streamChat(message, historyForRequest);
        setBusy(false, "Done");
      } catch (error) {
        state.history.push({
          role: "assistant",
          content: `Server error: ${error && error.message ? error.message : "Request failed"}`
        });
        render();
        setBusy(false, error && error.message ? error.message : "Request failed");
      }
    });

    resetBtn.addEventListener("click", () => {
      if (state.busy) {
        return;
      }

      state.history = [];
      inputEl.value = "";
      setBusy(false, "Ready");
      render();
    });

    inputEl.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        sendBtn.click();
      }
    });

    render();
  </script>
</body>
</html>
